server:
  port: 8080

spring:
  application:
    name: E-Commerce-Application

  datasource:
    url: jdbc:mysql://localhost:3306/ecom_app
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect